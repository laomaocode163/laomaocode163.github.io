name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: 'cloudflare'
  cancel-in-progress: true

env:
  # 覆盖 Astro site，使 canonical/sitemap/RSS 指向 Cloudflare 域名。
  # 若有自定义域名，请在仓库 Settings → Variables 中设置 CLOUDFLARE_SITE_URL。
  SITE_URL: ${{ vars.CLOUDFLARE_SITE_URL || 'https://nianmng-blog.pages.dev' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Astro + Pagefind)
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=nianmng-blog --commit-dirty=true
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

# Cloudflare Pages 通过 Dashboard 或 Wrangler CLI 部署
# 1. 安装 Wrangler: npm install -g wrangler
# 2. 登录: wrangler login
# 3. 部署: wrangler pages deploy dist --project-name=nianmng-blog
# 或者连接 GitHub 仓库后，Cloudflare Pages 会自动使用以下构建设置：
#   - 构建命令: npm run build
#   - 输出目录: dist
#   - Node.js 版本: 20

name = "nianmng-blog"
compatibility_date = "2025-01-01"

[site]
bucket = "./dist"

<svg xmlns="http://www.w3.org/2000/svg" width="640" height="340" viewBox="0 0 640 340" font-family="Helvetica, Arial, sans-serif">
  <!-- 以下 metadata 模拟 draw.io 导出 SVG 时勾选 "Include a copy of my diagram" 嵌入的源数据（不影响显示，仅用于回编辑） -->
  <metadata>
    <mxfile host="app.diagrams.net">
      <diagram name="Page-1">
        <mxGraphModel>
          <root>
            <mxCell id="0"/>
            <mxCell id="1" parent="0"/>
            <mxCell id="2" value="开始" style="rounded=1;fillColor=#dae8fc;strokeColor=#6c8ebf;" vertex="1" parent="1"><mxGeometry x="240" y="20" width="160" height="60" as="geometry"/></mxCell>
            <mxCell id="3" value="处理请求" style="fillColor=#d5e8d4;strokeColor=#82b366;" vertex="1" parent="1"><mxGeometry x="240" y="130" width="160" height="60" as="geometry"/></mxCell>
            <mxCell id="4" value="结束" style="rounded=1;fillColor=#ffe6cc;strokeColor=#d79b00;" vertex="1" parent="1"><mxGeometry x="240" y="240" width="160" height="60" as="geometry"/></mxCell>
            <mxCell id="5" style="edgeStyle=orthogonalEdgeStyle;" edge="1" parent="1" source="2" target="3"><mxGeometry relative="1" as="geometry"/></mxCell>
            <mxCell id="6" style="edgeStyle=orthogonalEdgeStyle;" edge="1" parent="1" source="3" target="4"><mxGeometry relative="1" as="geometry"/></mxCell>
          </root>
        </mxGraphModel>
      </diagram>
    </mxfile>
  </metadata>

  <!-- 图形：开始 -->
  <rect x="240" y="20" width="160" height="60" rx="14" ry="14" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="320" y="56" text-anchor="middle" font-size="16" fill="#1a1a1a">开始</text>

  <!-- 箭头 1->2 -->
  <path d="M320 80 L320 130" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- 图形：处理 -->
  <rect x="240" y="130" width="160" height="60" rx="4" ry="4" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="320" y="166" text-anchor="middle" font-size="16" fill="#1a1a1a">处理请求</text>

  <!-- 箭头 2->3 -->
  <path d="M320 190 L320 240" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- 图形：结束 -->
  <rect x="240" y="240" width="160" height="60" rx="14" ry="14" fill="#ffe6cc" stroke="#d79b00" stroke-width="2"/>
  <text x="320" y="276" text-anchor="middle" font-size="16" fill="#1a1a1a">结束</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L8 3 L0 6 Z" fill="#666"/>
    </marker>
  </defs>
</svg>
